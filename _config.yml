title: "Kapil Yadav"

email:

description: >-
  Fire governance, political ecology, environmental humanities,
  agrarian change, and relational approaches to fire.

url: "https://kapil-yadav.com"

baseurl: ""

repository: "kapilyadav1991/kapilyadav1991.github.io"

minimal_mistakes_skin: "contrast"

search: true

markdown: kramdown

remote_theme: "mmistakes/minimal-mistakes"

permalink: /:categories/:title/

paginate: 5

paginate_path: /page:num/

timezone: Europe/London

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Kapil Yadav"
  avatar: "/assets/images/profile.jpg"
  bio: "Researcher working on fire governance, political ecology, environmental humanities, and agrarian change."
  location: "London, UK"

  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kapilyadav1991"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kapilyadav1991"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

sass:
  style: compressed
